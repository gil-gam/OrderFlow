services:
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-db
    environment:
      POSTGRES_DB: orderflow
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/OrderFlow.Api/Dockerfile
    container_name: orderflow-api
    ports:
      - "7279:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=orderflow;Username=orderflow;Password=orderflow123;"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: