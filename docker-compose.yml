services:
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: OrderFlowDb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - orderflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderflow-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=OrderFlowDb;Username=postgres;Password=postgres"
      Jwt__Key: ${JWT_KEY:-OrderFlow-SuperSecret-Key-Minimum-32-Characters-Long!!}
      Jwt__Issuer: "OrderFlow.Api"
      Jwt__Audience: "OrderFlow.Client"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  orderflow_pgdata: