name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: OrderFlowDb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Clear NuGet cache and fix permissions
        run: |
          rm -rf ~/.nuget/packages/mediatr.contracts || true
          rm -rf ~/.nuget/packages/mediatr || true
          mkdir -p ${{ env.NUGET_PACKAGES }}
          chmod -R 755 ${{ env.NUGET_PACKAGES }} || true

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests - Domain
        run: >-
          dotnet test tests/OrderFlow.Domain.Tests
          --no-restore
          --configuration Release
          --logger "console;verbosity=detailed"

      - name: Run unit tests - Application
        run: >-
          dotnet test tests/OrderFlow.Application.Tests
          --no-restore
          --configuration Release
          --logger "console;verbosity=detailed"

      - name: Run integration tests
        run: >-
          dotnet test tests/OrderFlow.IntegrationTests
          --no-restore
          --configuration Release
          --logger "console;verbosity=detailed"
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=OrderFlowDb;Username=postgres;Password=postgres
